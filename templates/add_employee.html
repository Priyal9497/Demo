{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3 class="text-center">
                    Add New Employee
                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Employee Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            placeholder="Enter employee name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Enter email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Department
                        </label>

                        <select
                            class="form-select"
                            name="department"
                            required>

                            <option value="">Select Department</option>

                            <option>IT</option>
                            <option>HR</option>
                            <option>Finance</option>
                            <option>Marketing</option>
                            <option>Sales</option>
                            <option>Support</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Salary
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="salary"
                            placeholder="Enter salary"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-success">

                            Save Employee

                        </button>

                    </div>

                </form>

            </div>

        </div>

        <div class="mt-3">

            <a href="/employees" class="btn btn-secondary">
                ← Back to Employee List
            </a>

        </div>

    </div>

</div>

{% endblock %}
