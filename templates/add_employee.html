{% extends "base.html" %}

{% block content %}

<h2>Add Employee</h2>

<form method="POST">

    <input type="text"
           name="name"
           placeholder="Enter Name"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <br><br>

    <input type="text"
           name="department"
           placeholder="Department"
           required>

    <br><br>

    <input type="number"
           name="salary"
           placeholder="Salary"
           required>

    <br><br>

    <button type="submit">
        Save Employee
    </button>

</form>

{% endblock %}
